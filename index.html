<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Contador - Accenture Style</title>
    <style>
        /* Estilos inspirados en accenture.com */
        :root {
            --accenture-red: #A100FF;
            --accenture-dark: #000000;
            --accenture-light: #FFFFFF;
            --accenture-gray: #F5F5F5;
            --accenture-border: #E0E0E0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--accenture-gray) 0%, var(--accenture-light) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: var(--accenture-light);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 1px solid var(--accenture-border);
        }
        
        .header {
            margin-bottom: 30px;
        }
        
        .header h1 {
            color: var(--accenture-dark);
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 1.1rem;
        }
        
        .counter-display {
            font-size: 4rem;
            font-weight: bold;
            color: var(--accenture-red);
            margin: 30px 0;
            padding: 20px;
            background: var(--accenture-gray);
            border-radius: 12px;
            border: 2px solid var(--accenture-border);
        }
        
        .buttons-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-increment {
            background: var(--accenture-red);
            color: var(--accenture-light);
        }
        
        .btn-increment:hover:not(:disabled) {
            background: #8C00E6;
            transform: translateY(-2px);
        }
        
        .btn-decrement {
            background: var(--accenture-dark);
            color: var(--accenture-light);
        }
        
        .btn-decrement:hover:not(:disabled) {
            background: #333;
            transform: translateY(-2px);
        }
        
        .btn-reset {
            background: var(--accenture-gray);
            color: var(--accenture-dark);
            border: 2px solid var(--accenture-border);
        }
        
        .btn-reset:hover:not(:disabled) {
            background: #E5E5E5;
            transform: translateY(-2px);
        }
        
        .footer {
            margin-top: 30px;
            color: #999;
            font-size: 0.9rem;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .counter-display {
                font-size: 3rem;
                padding: 15px;
            }
            
            .buttons-container {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            
            .btn {
                padding: 12px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>App Contador</h1>
            <p>Controla tu contador con estilo Accenture</p>
        </div>
        
        <div class="counter-display" id="counter">0</div>
        
        <div class="buttons-container">
            <button class="btn btn-increment" id="increment" onclick="increment()">
                + Sumar
            </button>
            
            <button class="btn btn-decrement" id="decrement" onclick="decrement()" disabled>
                - Restar
            </button>
            
            <button class="btn btn-reset" id="reset" onclick="reset()">
                ↺ Reiniciar
            </button>
        </div>
        
        <div class="footer">
            <p>Desarrollado con ❤️ - Estilo Accenture</p>
        </div>
    </div>

    <script>
        let count = 0;
        const counterElement = document.getElementById('counter');
        const incrementBtn = document.getElementById('increment');
        const decrementBtn = document.getElementById('decrement');
        const resetBtn = document.getElementById('reset');
        
        function updateCounter() {
            counterElement.textContent = count;
            
            // Deshabilitar botón de restar si el contador es 0
            if (count === 0) {
                decrementBtn.disabled = true;
            } else {
                decrementBtn.disabled = false;
            }
            
            // Animación suave al cambiar el valor
            counterElement.style.transform = 'scale(1.1)';
            setTimeout(() => {
                counterElement.style.transform = 'scale(1)';
            }, 150);
        }
        
        function increment() {
            count++;
            updateCounter();
        }
        
        function decrement() {
            if (count > 0) {
                count--;
                updateCounter();
            }
        }
        
        function reset() {
            count = 0;
            updateCounter();
            
            // Animación de reinicio
            counterElement.style.transform = 'rotate(360deg)';
            counterElement.style.transition = 'transform 0.5s ease';
            setTimeout(() => {
                counterElement.style.transform = 'rotate(0deg)';
                counterElement.style.transition = 'transform 0.3s ease';
            }, 500);
        }
        
        // Inicializar
        updateCounter();
    </script>
</body>
</html>
